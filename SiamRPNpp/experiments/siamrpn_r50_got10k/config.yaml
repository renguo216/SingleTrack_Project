META_ARC: "siamrpn_r50_got10k"

BACKBONE:
    TYPE: "resnet50"
    KWARGS:
        used_layers: [2, 3, 4]
    PRETRAINED: "D:/A大学课程/大三/大三下实训/pysot-master/pretrained_models/resnet50.pth"
    TRAIN_LAYERS: ['layer2', 'layer3', 'layer4']
    LAYERS_LR: 0.1
    TRAIN_EPOCH: 2

ADJUST:
    ADJUST: true
    TYPE: "AdjustAllLayer"
    KWARGS:
        in_channels: [512, 1024, 2048]
        out_channels: [256, 256, 256]

RPN:
    TYPE: 'MultiRPN'
    KWARGS:
        anchor_num: 5
        in_channels: [256, 256, 256]
        weighted: true

MASK:
    MASK: false

ANCHOR:
    STRIDE: 8
    RATIOS: [0.33, 0.5, 1, 2, 3]
    SCALES: [8]
    ANCHOR_NUM: 5

TRACK:
    TYPE: 'SiamRPNTracker'
    PENALTY_K: 0.05
    WINDOW_INFLUENCE: 0.42
    LR: 0.38
    EXEMPLAR_SIZE: 127
    INSTANCE_SIZE: 255
    BASE_SIZE: 8
    CONTEXT_AMOUNT: 0.5

TRAIN:
    EXEMPLAR_SIZE: 127
    SEARCH_SIZE: 255
    BASE_SIZE: 8
    OUTPUT_SIZE: 25

    RESUME: ''
    PRETRAINED: ''
    LOG_DIR: './logs'
    SNAPSHOT_DIR: './snapshot'

    EPOCH: 20
    START_EPOCH: 0
    BATCH_SIZE: 8
    NUM_WORKERS: 1
    MOMENTUM: 0.9
    WEIGHT_DECAY: 0.0001
    CLS_WEIGHT: 1.0
    LOC_WEIGHT: 1.2
    MASK_WEIGHT: 1
    PRINT_FREQ: 20
    LOG_GRADS: false
    GRAD_CLIP: 10.0
    BASE_LR: 0.001

    LR:
        TYPE: 'log'
        KWARGS: {}
    LR_WARMUP:
        WARMUP: true
        TYPE: 'step'
        EPOCH: 1
        KWARGS: {}

DATASET:
    NAMES: ('GOT10K',)
    VIDEOS_PER_EPOCH: 1000

    TEMPLATE:
        SHIFT: 4
        SCALE: 0.05
        BLUR: 0.0
        FLIP: 0.0
        COLOR: 1.0

    SEARCH:
        SHIFT: 64
        SCALE: 0.18
        BLUR: 0.0
        FLIP: 0.0
        COLOR: 1.0

    NEG: 0.2
    GRAY: 0.0

    GOT10K:
        ROOT: 'training_dataset/got10k/crop511'
        ANNO: 'training_dataset/got10k/train.json'
        FRAME_RANGE: 100
        NUM_USE: 500